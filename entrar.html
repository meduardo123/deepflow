<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DEEPFLOW</title>
  <link rel="icon" type="image/svg+xml" href="assets/icone.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

  <!-- Header mínimo -->
  <header class="auth-header" style="position:relative;">
    <a href="index.html" class="auth-back" aria-label="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
    <a href="index.html">
      <img src="assets/logo.svg" alt="Deepflow" class="auth-header-logo">
    </a>
  </header>

  <div class="auth-body">
    <div class="auth-card">
      <span class="auth-card-eyebrow">Acesso</span>
      <h1 class="auth-card-title">Bem‑vindo <em>de volta.</em></h1>

      <!-- OAuth -->
      <button class="oauth-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuar com Google
      </button>
      <button class="oauth-btn" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continuar com Apple
      </button>

      <div class="auth-divider"><span>ou</span></div>

      <!-- Formulário -->
      <form id="loginForm" novalidate>
        <div class="field">
          <label class="field-label" for="email">E-mail</label>
          <input class="field-input" type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label class="field-label" for="password">Senha</label>
          <a href="recuperar.html" class="forgot-link">Esqueci a senha</a>
          <div class="field-password-wrap">
            <input class="field-input" type="password" id="password" name="password" placeholder="Sua senha" autocomplete="current-password" required>
            <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="eyeIcon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;padding:16px;font-size:12px;letter-spacing:0.18em;">
          Entrar
        </button>
      </form>

      <div class="auth-links">
        Não tem conta? <a href="cadastrar.html">Cadastre-se gratuitamente</a>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    © 2026 Deepflow · <a href="#">Privacidade</a> · <a href="#">Termos</a>
  </footer>

  <script>
    // Toggle senha
    const pwdInput = document.getElementById('password');
    const pwdToggle = document.getElementById('pwdToggle');
    pwdToggle.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      pwdToggle.querySelector('svg').innerHTML = isText
        ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });
    // Submit mock
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      window.location.href = 'conta.html';
    });
  </script>
</body>
</html>
