<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — DEEPFLOW</title>
  <link rel="icon" type="image/svg+xml" href="assets/icone.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

  <header class="auth-header" style="position:relative;">
    <a href="entrar.html" class="auth-back" aria-label="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
    <a href="index.html">
      <img src="assets/logo.svg" alt="Deepflow" class="auth-header-logo">
    </a>
  </header>

  <div class="auth-body">
    <div class="auth-card">
      <span class="auth-card-eyebrow">Novo cadastro</span>
      <h1 class="auth-card-title">Crie sua <em>conta.</em></h1>

      <button class="oauth-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Cadastrar com Google
      </button>

      <div class="auth-divider"><span>ou preencha os dados</span></div>

      <form id="registerForm" novalidate>
        <div class="field-row">
          <div class="field">
            <label class="field-label" for="firstName">Nome</label>
            <input class="field-input" type="text" id="firstName" name="firstName" placeholder="Ricardo" autocomplete="given-name" required>
          </div>
          <div class="field">
            <label class="field-label" for="lastName">Sobrenome</label>
            <input class="field-input" type="text" id="lastName" name="lastName" placeholder="Mendes" autocomplete="family-name" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="email">E-mail</label>
          <input class="field-input" type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label class="field-label" for="phone">Telefone / WhatsApp <span style="font-weight:400;text-transform:none;letter-spacing:0;">(opcional)</span></label>
          <input class="field-input" type="tel" id="phone" name="phone" placeholder="(11) 9 0000-0000" autocomplete="tel">
        </div>
        <div class="field">
          <label class="field-label" for="password">Senha</label>
          <div class="field-password-wrap">
            <input class="field-input" type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8">
            <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="field-hint">Mínimo 8 caracteres, com letra e número.</p>
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;margin:4px 0 20px;font-size:12px;color:var(--ink-muted);line-height:1.5;">
          <input type="checkbox" id="terms" required style="margin-top:2px;flex-shrink:0;width:16px;height:16px;cursor:pointer;">
          <label for="terms">
            Concordo com os <a href="#" style="color:var(--ink);text-decoration:underline;">Termos de Uso</a> e a
            <a href="#" style="color:var(--ink);text-decoration:underline;">Política de Privacidade</a> da Deepflow.
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="padding:16px;font-size:12px;letter-spacing:0.18em;">
          Criar minha conta
        </button>
      </form>

      <div class="auth-links">
        Já tem conta? <a href="entrar.html">Entrar</a>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    © 2026 Deepflow · <a href="#">Privacidade</a> · <a href="#">Termos</a>
  </footer>

  <script>
    document.getElementById('pwdToggle').addEventListener('click', function() {
      const i = document.getElementById('password');
      i.type = i.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('registerForm').addEventListener('submit', e => {
      e.preventDefault();
      window.location.href = 'conta.html';
    });
  </script>
</body>
</html>
